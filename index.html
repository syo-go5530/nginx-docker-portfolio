<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鎌田翔吾のポートフォリオ</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- パーティクル背景 -->
<div id="particles"></div>

<!-- ヘッダー -->
<header>
  <div class="terminal-bar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="terminal-label">portfolio.sh — syo-go5530</span>
  </div>
  <div class="header-body">
    <h1>鎌田翔吾のポートフォリオ</h1>
    <p class="header-sub">
      <span>$</span> Infrastructure Engineer in Training
      <span class="cursor"></span>
    </p>
  </div>
</header>

<!-- メイン -->
<main>
  <div class="section-head">
    <h2>活動記録</h2>
    <span class="section-badge" id="repoCount">loading...</span>
  </div>

  <div class="cards-track" id="cardsTrack"></div>
</main>

<!-- フッター -->
<footer>
  &copy; 2025 鎌田翔吾 — Built with HTML / CSS / JavaScript
</footer>

<!-- モーダル -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="terminal-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <a id="modalGhLink" href="#" target="_blank" rel="noopener" class="modal-gh-link">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
          .64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08
          2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
          1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHubで見る
      </a>
      <button class="modal-close" id="modalClose" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
